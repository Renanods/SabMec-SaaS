<div class="modal fade" id="modalConsultaClientes" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark text-white border-secondary shadow-lg">
            <div class="modal-header border-secondary" style="background-color: #1a1d20;">
                <h5 class="modal-title d-flex align-items-center gap-2">
                    <i class="bi bi-person-search text-info"></i>
                    Consultar Clientes
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <div class="modal-body p-4">
                <div class="d-flex gap-4 mb-3 p-2 rounded" style="background-color: #212529;">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="modal_cliente_tipo_busca" id="c_nome" value="nome" checked>
                        <label class="form-check-label text-light small" for="c_nome">Nome</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="modal_cliente_tipo_busca" id="c_cod" value="id">
                        <label class="form-check-label text-light small" for="c_cod">Codigo</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="modal_cliente_tipo_busca" id="c_doc" value="documento">
                        <label class="form-check-label text-light small" for="c_doc">CPF/CNPJ</label>
                    </div>
                </div>

                <input type="text" id="modal_cliente_termo" class="form-control form-control-sabmec mb-3" placeholder="Digite e pressione Enter para buscar...">

                <div class="table-responsive" style="max-height: 350px;">
                    <table class="table table-dark table-hover align-middle border-secondary">
                        <thead class="sticky-top bg-dark">
                            <tr class="text-secondary small">
                                <th>COD.</th>
                                <th>NOME</th>
                                <th>CPF/CNPJ</th>
                                <th class="text-end">ACAO</th>
                            </tr>
                        </thead>

                        <tbody id="clientes_tabela">
                            <tr>
                                <td colspan="4" class="text-center text-secondary py-3">
                                    Pressione Enter para consultar.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
window.inicializarConsultaClientes = function (config) {
    const modalEl = document.getElementById('modalConsultaClientes');
    const termoInput = document.getElementById('modal_cliente_termo');
    const tabela = document.getElementById('clientes_tabela');
    const clienteBusca = document.getElementById(config.inputId || 'cliente_busca');
    const clienteId = document.getElementById(config.hiddenId || 'cliente_id');
    const btnCliente = document.getElementById(config.buttonId || 'btnConsultaCliente');
    const modalClientes = bootstrap.Modal.getOrCreateInstance(modalEl);

    if (!modalEl || !termoInput || !tabela || !clienteBusca || !clienteId || !btnCliente) {
        return;
    }

    function abrirConsultaClientes() {
        termoInput.value = clienteBusca.value.trim();
        tabela.innerHTML = '<tr><td colspan="4" class="text-center text-secondary py-3">Pressione Enter para consultar.</td></tr>';
        modalClientes.show();
        setTimeout(() => { termoInput.focus(); termoInput.select(); }, 300);
    }

    async function buscarClientesModal() {
        const termo = termoInput.value.trim();
        const tipoBusca = document.querySelector('input[name="modal_cliente_tipo_busca"]:checked').value;
        tabela.innerHTML = '<tr><td colspan="4" class="text-center py-3"><div class="spinner-border spinner-border-sm text-info"></div> Consultando...</td></tr>';

        try {
            const response = await fetch(`/os/buscar-clientes?q=${encodeURIComponent(termo)}&tipo_busca=${tipoBusca}`);
            const data = await response.json();
            tabela.innerHTML = '';

            if (!data.clientes || data.clientes.length === 0) {
                tabela.innerHTML = '<tr><td colspan="4" class="text-center text-secondary py-3">Nenhum cliente encontrado.</td></tr>';
                return;
            }

            data.clientes.forEach(cliente => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>#${cliente.id}</td><td>${cliente.nome}</td><td>${cliente.documento || '---'}</td><td class="text-end"><button type="button" class="btn btn-sm btn-outline-info">Selecionar</button></td>`;

                tr.querySelector('button').addEventListener('click', function () {
                    clienteId.value = cliente.id;
                    clienteBusca.value = `#${cliente.id} - ${cliente.nome}`;
                    modalClientes.hide();

                    if (typeof config.onSelect === 'function') {
                        config.onSelect(cliente);
                    }
                });

                tabela.appendChild(tr);
            });
        } catch (error) {
            tabela.innerHTML = '<tr><td colspan="4" class="text-danger text-center py-3">Erro na consulta.</td></tr>';
        }
    }

    clienteBusca.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            abrirConsultaClientes();
        }
    });

    btnCliente.addEventListener('click', abrirConsultaClientes);

    if (!termoInput.dataset.consultaClientesBind) {
        termoInput.dataset.consultaClientesBind = '1';
        termoInput.addEventListener('keydown', async function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                await buscarClientesModal();
            }
        });
    }
};
</script>
